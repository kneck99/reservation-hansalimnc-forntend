<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예약 완료 | 한살림 농업살림센터</title>
  <link rel="stylesheet" href="./assets/pretendard.css" />
  <link rel="stylesheet" href="./assets/styles.css" />
  <style>
    .result-wrap{
      max-width:840px;
      margin:48px auto;
      padding:0 16px;
    }
    .result-card{
      background:#fff;
      border:1px solid rgba(23,59,52,.1);
      border-radius:24px;
      box-shadow:0 14px 32px rgba(0,40,27,.06);
      padding:28px 24px;
    }
    .result-title{
      margin:0 0 8px;
      font-size:32px;
      line-height:1.2;
    }
    .result-desc{
      margin:0 0 24px;
      color:#6f786f;
    }
    .result-grid{
      display:grid;
      grid-template-columns:180px 1fr;
      gap:12px 16px;
      margin-top:20px;
    }
    .result-grid dt{
      font-weight:800;
    }
    .result-grid dd{
      margin:0;
      color:#173b34;
    }
    .result-actions{
      display:flex;
      gap:12px;
      justify-content:flex-end;
      margin-top:28px;
      flex-wrap:wrap;
    }
    @media (max-width:720px){
      .result-grid{
        grid-template-columns:1fr;
        gap:6px 0;
      }
      .result-actions{
        justify-content:stretch;
      }
      .result-actions .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <main class="result-wrap">
    <section class="result-card">
      <h1 class="result-title">예약이 완료되었습니다.</h1>
      <p class="result-desc">아래 예약 정보를 확인해 주세요.</p>

      <dl class="result-grid" id="resultInfo">
        <dt>예약번호</dt>
        <dd id="r-reservationNo">-</dd>

        <dt>예약구분</dt>
        <dd id="r-bookingType">-</dd>

        <dt>공간</dt>
        <dd id="r-resourceName">-</dd>

        <dt>이용일</dt>
        <dd id="r-dateText">-</dd>

        <dt>담당자</dt>
        <dd id="r-contactName">-</dd>

        <dt>연락처</dt>
        <dd id="r-phone">-</dd>

        <dt>이메일</dt>
        <dd id="r-email">-</dd>

        <dt>사용목적</dt>
        <dd id="r-purpose">-</dd>

        <dt>예상/결제금액</dt>
        <dd id="r-amount">-</dd>
      </dl>

      <div class="result-actions">
        <a class="btn btn-secondary" id="btnLookup" href="#">예약조회</a>
        <a class="btn btn-primary" id="btnHome" href="#">홈으로</a>
      </div>
    </section>
  </main>

  <script src="./assets/config.js"></script>
  <script>
    (function () {
      const cfg = window.HS_CONFIG || {};
      const data = JSON.parse(sessionStorage.getItem('hs_last_reservation') || '{}');

      const reservation = data.reservation || data.booking || data.appsScript?.reservation || {};
      const reservationNo = data.reservationNo || data.appsScript?.reservationNo || reservation.reservationNo || '-';

      const bookingTypeMap = {
        meeting: '회의실 예약',
        dorm: '연수원 예약'
      };

      const dateText = reservation.bookingType === 'meeting'
        ? (reservation.startDate || '-')
        : [reservation.startDate, reservation.endDate].filter(Boolean).join(' ~ ') || '-';

      document.getElementById('r-reservationNo').textContent = reservationNo;
      document.getElementById('r-bookingType').textContent = bookingTypeMap[reservation.bookingType] || '-';
      document.getElementById('r-resourceName').textContent = reservation.resourceName || '-';
      document.getElementById('r-dateText').textContent = dateText;
      document.getElementById('r-contactName').textContent = reservation.contactName || '-';
      document.getElementById('r-phone').textContent = reservation.phone || '-';
      document.getElementById('r-email').textContent = reservation.email || '-';
      document.getElementById('r-purpose').textContent = reservation.purpose || '-';
      document.getElementById('r-amount').textContent = reservation.totalAmount != null
        ? `${Number(reservation.totalAmount).toLocaleString('ko-KR')}원`
        : '-';

      document.getElementById('btnHome').href = cfg.homeUrl || 'https://www.hansalimnc.co.kr';
      document.getElementById('btnLookup').href = cfg.lookupUrl || './lookup.html';
    })();
  </script>
</body>
</html>
