<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한살림 농업살림센터 예약</title>
  <link rel="stylesheet" href="./assets/pretendard.css" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="./index.html" aria-label="한살림 농업살림센터 예약 홈">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">
          <strong>한살림 농업살림센터 예약</strong>
          <span>reservation.hansalimnc.co.kr</span>
        </span>
      </a>

      <nav class="nav-links" aria-label="주요 메뉴">
        <div class="top-auth-area" data-auth-status></div>
        <p>소속: <span data-user-affiliation></span></p>
        <a href="./index.html" class="active">예약</a>
        <a href="./success.html">완료 예시</a>
        <a href="./fail.html">실패 예시</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="hero-card">
        <div class="hero-copy">
          <h1>연수원 · 회의실 예약</h1>
          <p>이용 정보를 입력하고 예약을 진행해 주세요.</p>
        </div>

        <aside class="price-card" aria-label="연수원 이용요금 안내">
          <h3>연수원 이용요금</h3>
          <ul>
            <li>1~8인: 150,000원</li>
            <li>9인부터 1인당 20,000원 추가</li>
          </ul>
        </aside>
      </section>

      <section class="card">
        <h2>예약 정보 입력</h2>

        <form id="reservation-form" class="form-grid" novalidate>
          <label class="field">
            <span class="field-label">담당자 성함</span>
            <input type="text" id="contactName" name="contactName" maxlength="40" required />
          </label>

          <label class="field">
            <span class="field-label">담당자 연락처</span>
            <input
              type="tel"
              id="phone"
              name="phone"
              maxlength="13"
              placeholder="000-0000-0000"
              required
            />
            <small class="field-help">숫자를 입력하면 000-0000-0000 형식으로 자동 정리됩니다.</small>
          </label>

          <label class="field full">
  <span class="field-label">소속</span>
  <input
    type="text"
    id="affiliation"
    name="affiliation"
    placeholder="로그인한 계정의 소속이 표시됩니다"
    readonly
  />
</label>
          
          <label class="field full">
            <span class="field-label">이메일주소</span>
            <input
              type="email"
              id="email"
              name="email"
              maxlength="120"
              placeholder="example@email.com"
              required
            />
          </label>

          <div class="full booking-type-group">
            <span class="field-label">예약 구분</span>

            <div class="booking-type-options">
              <label class="booking-type-card active" data-booking-card="meeting">
                <input type="radio" name="bookingType" value="meeting" checked />
                <span>회의실 예약</span>
              </label>

              <label class="booking-type-card" data-booking-card="dorm">
                <input type="radio" name="bookingType" value="dorm" />
                <span>연수원 예약</span>
              </label>
            </div>
          </div>

          <!-- 회의실 예약 -->
          <div id="meeting-fields" class="dynamic-section full">
            <div class="section-grid">
              <label class="field">
                <span class="field-label">사용신청일자</span>
                <input type="date" id="meetingDate" name="meetingDate" />
              </label>

              <label class="field">
                <span class="field-label">회의실 선택</span>
                <select id="meetingRoom" name="meetingRoom">
                  <option value="">선택해 주세요</option>
                  <option value="2층 대회의실[모심]">2층 대회의실[모심]</option>
                  <option value="2층 중회의실[살림]">2층 중회의실[살림]</option>
                  <option value="3층 중회의실[생명]">3층 중회의실[생명]</option>
                </select>
              </label>

              <label class="field full">
                <span class="field-label">사용신청목적(개인 또는 단체명)</span>
                <input type="text" id="meetingPurpose" name="meetingPurpose" maxlength="100" />
              </label>
            </div>
          </div>

          <!-- 연수원 예약 -->
          <div id="dorm-fields" class="dynamic-section full is-hidden">
            <div class="section-grid">
              <label class="field">
                <span class="field-label">입실일</span>
                <input type="date" id="checkInDate" name="checkInDate" />
              </label>

              <label class="field">
                <span class="field-label">퇴실일</span>
                <input type="date" id="checkOutDate" name="checkOutDate" />
              </label>

              <label class="field">
                <span class="field-label">숙박인원</span>
                <input
                  type="number"
                  id="headcount"
                  name="headcount"
                  min="1"
                  step="1"
                  inputmode="numeric"
                  placeholder="숫자만 입력"
                />
              </label>

              <label class="field">
                <span class="field-label">정산방법</span>
                <select id="settlementMethod" name="settlementMethod">
                  <option value="">선택해 주세요</option>
                  <option value="카드결제">카드결제</option>
                </select>
              </label>

              <label class="field full">
                <span class="field-label">사용신청목적</span>
                <input type="text" id="dormPurpose" name="dormPurpose" maxlength="100" />
              </label>
            </div>
          </div>

          <div class="full">
            <label class="checkline" for="agree">
              <input type="checkbox" id="agree" />
              <span>이용약관 및 취소/환불정책을 확인했습니다.</span>
            </label>
          </div>

          <div class="full summary-box">
            <div>
              <strong>예상 결제금액</strong>
              <div id="quotedAmount">0원</div>
              <small class="field-help">연수원 예약 시 숙박인원을 입력하면 자동으로 계산됩니다.</small>
            </div>
          </div>

           <div class="full button-row button-row-end">
              <button type="button" class="btn btn-primary" id="btnPay">결제하기</button>
            </div>
        </form>

        <div class="policy-box">
          <strong>정책 링크</strong>
          <div class="policy-links">
            <a href="./pages/terms.html">이용약관</a>
            <a href="./pages/refund.html">취소/환불정책</a>
            <a href="./pages/privacy.html">개인정보처리방침</a>
            <a href="./pages/business.html">사업자정보</a>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>개발 상태 로그</h2>
        <pre id="log" class="log-box">준비됨</pre>
      </section>
    </div>
  </main>
  
<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<script src="./assets/config.js"></script>
<script src="./assets/auth.js"></script>
<script src="./assets/guard.js"></script>
<script src="./assets/app.js"></script>
<script>
  (async function () {
    const user = await window.HSGuard.protectPage();
    if (!user) return;

    window.HSGuard.fillUserFields(user);
    window.HSGuard.renderAuthStatus();
  })();
</script>
</body>
</html>
