<form id="reservation-form" class="form-grid">
  <label>
    <span>담당자 성함</span>
    <input type="text" id="contactName" name="contactName" required />
  </label>

  <label>
    <span>담당자 연락처</span>
    <input type="tel" id="phone" name="phone" placeholder="000-0000-0000" required />
    <small class="field-help">숫자를 입력하면 000-0000-0000 형식으로 자동 정리됩니다.</small>
  </label>

  <label class="full">
    <span>이메일주소</span>
    <input type="email" id="email" name="email" placeholder="example@email.com" required />
  </label>

  <div class="full booking-type-group">
    <span class="field-label">예약 구분</span>
    <div class="booking-type-options">
      <label class="booking-type-card active" data-booking-card="meeting">
        <input type="radio" name="bookingType" value="meeting" checked />
        <span>회의실 예약</span>
      </label>

      <label class="booking-type-card" data-booking-card="dorm">
        <input type="radio" name="bookingType" value="dorm" />
        <span>연수원 예약</span>
      </label>
    </div>
  </div>

  <!-- 회의실 예약 영역 -->
  <div id="meeting-fields" class="dynamic-section full">
    <div class="section-grid">
      <label>
        <span>사용신청일자</span>
        <input type="date" id="meetingDate" name="meetingDate" />
      </label>

      <label>
        <span>회의실 선택</span>
        <select id="meetingRoom" name="meetingRoom">
          <option value="">선택해 주세요</option>
          <option value="2층 대회의실[모심]">2층 대회의실[모심]</option>
          <option value="2층 중회의실[살림]">2층 중회의실[살림]</option>
          <option value="3층 중회의실[생명]">3층 중회의실[생명]</option>
        </select>
      </label>

      <label class="full">
        <span>사용신청목적(개인 또는 단체명)</span>
        <input type="text" id="meetingPurpose" name="meetingPurpose" />
      </label>
    </div>
  </div>

  <!-- 연수원 예약 영역 -->
  <div id="dorm-fields" class="dynamic-section full is-hidden">
    <div class="section-grid">
      <label>
        <span>입실일</span>
        <input type="date" id="checkInDate" name="checkInDate" />
      </label>

      <label>
        <span>퇴실일</span>
        <input type="date" id="checkOutDate" name="checkOutDate" />
      </label>

      <label>
        <span>숙박인원</span>
        <input type="number" id="headcount" name="headcount" min="1" placeholder="숫자만 입력" value="8" />
      </label>

      <label>
        <span>정산방법</span>
        <select id="settlementMethod" name="settlementMethod">
          <option value="">선택해 주세요</option>
          <option value="카드결제">카드결제</option>
          <option value="계좌이체">계좌이체</option>
          <option value="현장결제">현장결제</option>
        </select>
      </label>

      <label class="full">
        <span>사용신청목적</span>
        <input type="text" id="dormPurpose" name="dormPurpose" />
      </label>
    </div>
  </div>

  <label class="full checkline">
    <input type="checkbox" id="agree" required />
    <span>이용약관 및 취소/환불정책을 확인했습니다.</span>
  </label>

  <div class="full summary-box">
    <div>
      <strong>예상 결제금액</strong>
      <div id="quotedAmount">150,000원</div>
    </div>
    <button type="button" id="btnQuote" class="btn btn-secondary">금액 다시 계산</button>
  </div>

  <div class="full button-row">
    <button type="button" id="btnPrepare" class="btn btn-secondary">예약 검증</button>
    <button type="button" id="btnPay" class="btn btn-primary">결제하기</button>
  </div>
</form>
